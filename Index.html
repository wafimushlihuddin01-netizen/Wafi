<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Estetik Saya</title>
    <!-- Mengambil Font Modern dari Google Fonts -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        /* Gaya Dasar (CSS) */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa; /* Warna putih gading yang lembut */
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Container Utama */
        .card {
            background: white;
            padding: 40px;
            border-radius: 24px; /* Sudut melengkung yang modern */
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); /* Bayangan halus */
            text-align: center;
            max-width: 350px;
            width: 90%;
        }

        /* Foto Profil */
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #e0e0e0;
            margin-bottom: 20px;
            object-fit: cover;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            font-weight: 600;
        }

        p {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* Tombol Link */
        .btn {
            display: block;
            background: #000; /* Hitam memberikan kesan elegan */
            color: white;
            padding: 12px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 400;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px); /* Efek melayang saat kursor di atasnya */
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Anda bisa ganti URL gambar ini nanti -->
        <img src="https://unsplash.com" alt="Profile" class="profile-img">
        <h1>Halo, Saya [Nama Anda]</h1>
        <p>Saya adalah seorang kreatif yang suka membangun website estetik tanpa biaya. Senang berkenalan dengan Anda!</p>
        <a href="https://github.com" class="btn">Lihat Proyek Saya</a>
    </div>

</body>
</html>
